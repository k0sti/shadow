[package]
edition = "2024"
rust-version = "1.85"
name = "winit"
version = "0.31.0-beta.2"
build = "build.rs"
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "Cross-platform window creation library."
documentation = "https://docs.rs/winit"
readme = "README.md"
keywords = ["windowing"]
categories = ["gui"]
license = "Apache-2.0"
repository = "https://github.com/rust-windowing/winit"
resolver = "2"

[package.metadata.docs.rs]
