<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Shadow Cog Demo</title>
    <link rel="stylesheet" href="./styles.css">
    <script defer src="./app.js"></script>
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <p class="eyebrow">Shadow demo</p>
        <h1>Cog running a local HTML app</h1>
        <p class="lede">
          This is a tiny browser-native counter used to prove the app-launch path.
        </p>
      </section>

      <section class="card">
        <div class="counter">
          <span class="label">Count</span>
          <strong id="count" aria-live="polite">0</strong>
        </div>

        <div class="actions">
          <button id="increment" type="button">Increment</button>
          <button id="reset" type="button" class="ghost">Reset</button>
        </div>

        <p class="hint">Keyboard: <kbd>Space</kbd> increments, <kbd>R</kbd> resets.</p>
      </section>
    </main>
  </body>
</html>
